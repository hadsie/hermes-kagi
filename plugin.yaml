name: web-kagi
version: 1.0.0
description: "Kagi web search and content extraction. Supports filtered search with the kagi_search tool."
author: hadsie
kind: backend
requires_env:
  - name: KAGI_API_KEY
    description: Kagi API key (bearer token).
    url: https://kagi.com/api/keys
    secret: true
optional_env:
  - name: KAGI_BASE_URL
    description: "Override the API root (default https://kagi.com/api)."
  - name: KAGI_SAFE_SEARCH
    description: "Set to off to disable safe search (default on)."
provides_web_providers:
  - kagi
provides_tools:
  - kagi_search
